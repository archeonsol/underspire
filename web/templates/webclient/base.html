{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{game_name}}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
 
    <style>
        :root {
            --bg-deep:       #020204;
            --bg-surface:    #08080c;
            --bg-raised:     #0e0e14;
            --text-primary:  #c8c8d0;
            --text-dim:      #606070;
            --text-ghost:    #2a2a35;
            --accent-blood:  #8b1a1a;
            --accent-ember:  #c43030;
            --accent-glow:   rgba(200, 200, 208, 0.15);
            --border-subtle: rgba(139, 26, 26, 0.2);
            --vignette-intensity: 0.7;
        }
 
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'IBM Plex Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14.5px;
            line-height: 1.65;
        }
 
        /* CRT Effects */
        .crt-frame {
            position: fixed; inset: 0; pointer-events: none; z-index: 900;
            background: radial-gradient(ellipse 85% 80% at 50% 50%, transparent 55%, rgba(0, 0, 0, var(--vignette-intensity)) 100%);
        }
        .scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: 901;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.12) 2px, rgba(0, 0, 0, 0.12) 4px);
            mix-blend-mode: multiply;
        }
        .flicker {
            position: fixed; inset: 0; pointer-events: none; z-index: 902;
            opacity: 0; background: rgba(200, 200, 208, 0.015);
            animation: screenFlicker 8s infinite;
        }
        @keyframes screenFlicker {
            0%, 96%, 100% { opacity: 0; }
            96.5% { opacity: 1; }
            97% { opacity: 0; }
            97.5% { opacity: 0.5; }
            98% { opacity: 0; }
        }
 
        /* HUD */
        #hud {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 24px; background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            font-size: 11.5px; letter-spacing: 0.08em; color: var(--text-dim);
            text-transform: uppercase; flex-shrink: 0; z-index: 10; user-select: none;
        }
        #hud .hud-left, #hud .hud-right { display: flex; align-items: center; gap: 16px; }
        .connection-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--accent-blood); display: inline-block; margin-right: 6px;
            transition: background 0.5s, box-shadow 0.5s;
        }
        .connection-dot.connected { background: #2d8a4e; box-shadow: 0 0 6px rgba(45, 138, 78, 0.6); }
        .game-title { color: var(--accent-ember); font-weight: 500; font-size: 12px; letter-spacing: 0.15em; }
        .clock { font-variant-numeric: tabular-nums; }
 
        /* Output */
        #output-wrapper { flex-grow: 1; position: relative; overflow: hidden; }
        #output {
            height: 100%; padding: 24px 28px 40px; overflow-y: auto;
            word-wrap: break-word; white-space: pre-wrap; scroll-behavior: smooth;
        }
        #output .msg { padding: 1px 0; animation: msgIn 0.2s ease-out; }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #output .echo {
            color: var(--text-dim); border-left: 2px solid var(--border-subtle);
            padding-left: 12px; margin: 4px 0;
        }
        #output .sys { color: var(--accent-blood); font-size: 12px; letter-spacing: 0.06em; opacity: 0.7; }
        #output a { color: var(--accent-ember); text-decoration: none; border-bottom: 1px solid var(--border-subtle); }
        #output a:hover { color: #ff4444; border-color: #ff4444; }
 
        /* Scrollbar */
        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-track { background: transparent; }
        #output::-webkit-scrollbar-thumb { background: rgba(139, 26, 26, 0.3); border-radius: 3px; }
        #output::-webkit-scrollbar-thumb:hover { background: rgba(139, 26, 26, 0.5); }
 
        /* Scroll-to-bottom */
        #scroll-anchor {
            position: absolute; bottom: 16px; right: 24px;
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--bg-raised); border: 1px solid var(--border-subtle);
            color: var(--accent-ember); font-size: 16px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            z-index: 50; transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        #scroll-anchor:hover { transform: scale(1.1); background: var(--accent-blood); color: #fff; }
        #scroll-anchor.visible { display: flex; }
 
        /* Input */
        #input-container {
            display: flex; padding: 14px 24px; background: var(--bg-surface);
            border-top: 1px solid var(--border-subtle); align-items: center;
            flex-shrink: 0; z-index: 10; position: relative;
        }
        #input-container::before {
            content: ''; position: absolute; top: -1px; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-blood), var(--accent-ember), var(--accent-blood), transparent);
            opacity: 0.4;
        }
        #prompt {
            color: var(--accent-ember); margin-right: 14px; font-weight: 500; font-size: 18px;
            user-select: none; text-shadow: 0 0 8px rgba(196, 48, 48, 0.4);
        }
        #inputfield {
            flex-grow: 1; background: transparent; border: none; color: var(--text-primary);
            font-family: 'Fira Code', 'IBM Plex Mono', monospace; font-size: 15px;
            outline: none; caret-color: var(--accent-ember); letter-spacing: 0.02em;
        }
        #inputfield::placeholder { color: var(--text-ghost); font-style: italic; }
        #char-count {
            font-size: 10px; color: var(--text-ghost); margin-left: 12px;
            font-variant-numeric: tabular-nums; min-width: 40px; text-align: right;
        }
        #char-count.warn { color: var(--accent-ember); }
 
        /* Boot Overlay */
        #boot-screen {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'IBM Plex Mono', monospace; transition: opacity 0.8s ease;
        }
        #boot-screen.fade-out { opacity: 0; pointer-events: none; }
        .boot-text { color: var(--text-dim); font-size: 12px; letter-spacing: 0.1em; max-width: 500px; width: 90%; }
        .boot-text .line { opacity: 0; transform: translateY(2px); transition: opacity 0.3s, transform 0.3s; }
        .boot-text .line.visible { opacity: 1; transform: translateY(0); }
        .boot-text .line.ok { color: #2d8a4e; }
        .boot-text .line.warn { color: var(--accent-ember); }
        .boot-text .line.title {
            color: var(--accent-ember); font-size: 16px; font-weight: 700;
            letter-spacing: 0.2em; margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(196, 48, 48, 0.5);
        }
 
        /* Volume */
        #volume-control { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        #volume-control svg { width: 14px; height: 14px; fill: var(--text-dim); transition: fill 0.2s; }
        #volume-control:hover svg { fill: var(--text-primary); }
        #volume-slider {
            -webkit-appearance: none; appearance: none; width: 60px; height: 3px;
            background: var(--text-ghost); border-radius: 2px; outline: none;
        }
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            border-radius: 50%; background: var(--accent-ember); cursor: pointer;
        }
 
        /* ═══════════════════════════════════════
           ANSI / XTERM COLOR SUPPORT
           Evennia's text2html.js converts MUD
           color codes to these classes.
           ═══════════════════════════════════════ */
 
        /* Standard ANSI foreground */
        .ansi-black   { color: #4f4f4f; }
        .ansi-red     { color: #ff4444; }
        .ansi-green   { color: #44ff44; }
        .ansi-yellow  { color: #ffff44; }
        .ansi-blue    { color: #6688ff; }
        .ansi-magenta { color: #ff44ff; }
        .ansi-cyan    { color: #44ffff; }
        .ansi-white   { color: #dddddd; }
 
        /* Bright / bold ANSI foreground */
        .ansi-bright-black   { color: #888888; }
        .ansi-bright-red     { color: #ff6666; }
        .ansi-bright-green   { color: #66ff66; }
        .ansi-bright-yellow  { color: #ffff66; }
        .ansi-bright-blue    { color: #88aaff; }
        .ansi-bright-magenta { color: #ff66ff; }
        .ansi-bright-cyan    { color: #66ffff; }
        .ansi-bright-white   { color: #ffffff; }
 
        /* ANSI background */
        .ansi-bg-black   { background-color: #000000; }
        .ansi-bg-red     { background-color: #aa0000; }
        .ansi-bg-green   { background-color: #00aa00; }
        .ansi-bg-yellow  { background-color: #aa5500; }
        .ansi-bg-blue    { background-color: #0000aa; }
        .ansi-bg-magenta { background-color: #aa00aa; }
        .ansi-bg-cyan    { background-color: #00aaaa; }
        .ansi-bg-white   { background-color: #aaaaaa; }
 
        /* Text decoration classes */
        .ansi-bold      { font-weight: 700; }
        .ansi-dim       { opacity: 0.6; }
        .ansi-italic    { font-style: italic; }
        .ansi-underline { text-decoration: underline; text-underline-offset: 3px; }
        .ansi-blink     { animation: ansiBlink 1s step-end infinite; }
        .ansi-inverse   { filter: invert(1); }
        .ansi-strike,
        .ansi-strikethrough { text-decoration: line-through; }
 
        @keyframes ansiBlink {
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            #output { padding: 16px; font-size: 13px; }

<body>
 
    <div class="crt-frame"></div>
    <div class="scanlines"></div>
    <div class="flicker"></div>
 
    <div id="boot-screen">
        <div class="boot-text" id="boot-log"></div>
    </div>
 
    <div id="hud">
        <div class="hud-left">
            <span class="game-title">{{game_name}}</span>
            <span><span class="connection-dot" id="conn-dot"></span><span id="conn-status">CONNECTING</span></span>
        </div>
        <div class="hud-right">
            <div id="volume-control" title="Music volume">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <input type="range" id="volume-slider" min="0" max="100" value="40" />
            </div>
            <span class="clock" id="clock">--:--</span>
        </div>
    </div>
 
    <div id="output-wrapper">
        <div id="output"></div>
        <button id="scroll-anchor" title="Scroll to bottom">&#x25BE;</button>
    </div>
 
    <div id="input-container">
        <span id="prompt">&#x276F;</span>
        <input type="text" id="inputfield" autofocus autocomplete="off" spellcheck="false" placeholder="enter command..." />
        <span id="char-count"></span>
    </div>
 
    <script language="javascript" type="text/javascript">
        {% if websocket_enabled %}
            var wsactive = true;
        {% else %}
            var wsactive = false;
        {% endif %}
 
        {% if browser_sessid %}
           var csessid = "{{browser_sessid}}";
        {% else %}
           var csessid = false;
        {% endif %}
 
        {% if websocket_url %}
            var wsurl = "{{websocket_url}}";
        {% else %}
            var wsurl = "ws://" + this.location.hostname + ":{{websocket_port}}";
        {% endif %}
 
        // Dummy plugin handler so text2html.js doesn't crash looking for GoldenLayout
        window.plugin_handler = {
            add: function(name, plugin) { console.log("[sys] plugin bypass: " + name); }
        };
    </script>
 
    <script src="{% static 'webclient/js/evennia.js' %}"></script>
    <script src="{% static 'webclient/js/plugins/text2html.js' %}"></script>
 
    <script>
        $(document).ready(function() {
            var $output    = $('#output');
            var $input     = $('#inputfield');
            var $scrollBtn = $('#scroll-anchor');
            var $charCount = $('#char-count');
            var currentTrack = null;
            var musicVolume  = 0.4;
            var autoScroll   = true;
 
            // ═══════════════════════════════════════
            //  1. INITIALIZE EVENNIA IMMEDIATELY
            //     Connection opens right away.
            //     We do NOT pass onText here because
            //     this Evennia version uses the emitter
            //     system for receiving messages.
            // ═══════════════════════════════════════
            console.log("[sys] Booting Web Client...");
            Evennia.init({
                autoConnect: true
            });
 
            // ═══════════════════════════════════════
            //  2. ATTACH ALL HANDLERS VIA EMITTER
            //     Poll until emitter is ready, then
            //     hook text, prompt, connection, and
            //     audio events through it.
            // ═══════════════════════════════════════
            var emitterReady = setInterval(function() {
                if (Evennia.emitter) {
                    clearInterval(emitterReady);
                    console.log("[sys] Emitter ready. Attaching handlers.");
 
                    // --- RECEIVE TEXT FROM SERVER ---
                    Evennia.emitter.on("text", function(args, kwargs) {
                        var text = args[0];
                        if (window.text2html) { text = window.text2html(text); }
                        $output.append("<div class='msg'>" + text + "</div>");
                        scrollToBottom();
                    });
 
                    // --- RECEIVE PROMPTS ---
                    Evennia.emitter.on("prompt", function(args, kwargs) {
                        var text = args[0];
                        if (window.text2html) { text = window.text2html(text); }
                        $output.append("<div class='msg' style='color:var(--accent-ember)'>" + text + "</div>");
                        scrollToBottom();
                    });
 
                    // --- CONNECTION STATUS ---
                    Evennia.emitter.on("connection_open", function() {
                        console.log("[sys] WebSocket connected.");
                        $('#conn-dot').addClass('connected');
                        $('#conn-status').text('LINKED');
                    });
 
                    Evennia.emitter.on("connection_close", function() {
                        console.log("[sys] WebSocket disconnected.");
                        $('#conn-dot').removeClass('connected');
                        $('#conn-status').text('SEVERED');
                    });
 
                    // --- AUDIO ---
                    Evennia.emitter.on("play_music", function(args) {
                        if (currentTrack) { currentTrack.pause(); currentTrack.currentTime = 0; }
                        currentTrack = new Audio(args[0]);
                        currentTrack.volume = musicVolume;
                        currentTrack.loop = true;
                        currentTrack.play().catch(function() {
                            var forcePlay = function() {
                                if (currentTrack) currentTrack.play();
                                $(document).off('click keydown', forcePlay);
                            };
                            $(document).on('click keydown', forcePlay);
                        });
                        return true;
                    });
 
                    Evennia.emitter.on("stop_music", function() {
                        if (currentTrack) {
                            var fade = setInterval(function() {
                                if (currentTrack.volume > 0.05) {
                                    currentTrack.volume = Math.max(0, currentTrack.volume - 0.05);
                                } else {
                                    currentTrack.pause();
                                    currentTrack.currentTime = 0;
                                    clearInterval(fade);
                                }
                            }, 150);
                        }
                        return true;
                    });
                }
            }, 50);
 
            // ═══════════════════════════════════════
            //  3. BOOT SEQUENCE (cosmetic only)
            // ═══════════════════════════════════════
            var bootLines = [
                { text: "{{game_name}}", cls: "title", delay: 200 },
                { text: "────────────────────────────────", cls: "", delay: 100 },
                { text: "BIOS .......... HAEMATIC TERM v2.0", cls: "", delay: 150 },
                { text: "MEM CHECK ..... 640K OK", cls: "ok", delay: 120 },
                { text: "WEBSOCKET ..... " + (wsactive ? "ENABLED" : "POLLING"), cls: wsactive ? "ok" : "warn", delay: 200 },
                { text: "AUDIO SYS ..... STANDBY", cls: "", delay: 100 },
                { text: "CIPHER KEY .... ACCEPTED", cls: "ok", delay: 180 },
                { text: "────────────────────────────────", cls: "", delay: 100 },
                { text: "ESTABLISHING UPLINK...", cls: "warn", delay: 400 },
            ];
 
            var $bootLog = $('#boot-log');
            function runBoot(index) {
                if (index >= bootLines.length) {
                    setTimeout(function() {
                        $('#boot-screen').addClass('fade-out');
                        setTimeout(function() { $('#boot-screen').remove(); }, 900);
                    }, 600);
                    return;
                }
                var line = bootLines[index];
                var $line = $('<div class="line ' + line.cls + '">' + line.text + '</div>');
                $bootLog.append($line);
                setTimeout(function() { $line.addClass('visible'); }, 20);
                setTimeout(function() { runBoot(index + 1); }, line.delay);
            }
            runBoot(0);
 
            // ═══════════════════════════════════════
            //  4. SCROLL MANAGEMENT
            // ═══════════════════════════════════════
            $output.on('scroll', function() {
                var el = $output[0];
                var nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
                autoScroll = nearBottom;
                $scrollBtn.toggleClass('visible', !nearBottom);
            });
            $scrollBtn.on('click', function() {
                $output.scrollTop($output[0].scrollHeight);
            });
            function scrollToBottom() {
                if (autoScroll) { $output.scrollTop($output[0].scrollHeight); }
            }
 
            // ═══════════════════════════════════════
            //  5. CLOCK
            // ═══════════════════════════════════════
            function updateClock() {
                var now = new Date();
                $('#clock').text(
                    String(now.getHours()).padStart(2, '0') + ':' +
                    String(now.getMinutes()).padStart(2, '0')
                );
            }
            updateClock();
            setInterval(updateClock, 15000);
 
            // ═══════════════════════════════════════
            //  6. CHARACTER COUNT
            // ═══════════════════════════════════════
            $input.on('input', function() {
                var len = $input.val().length;
                if (len > 0) {
                    $charCount.text(len).toggleClass('warn', len > 200);
                } else {
                    $charCount.text('');
                }
            });
 
            // ═══════════════════════════════════════
            //  7. COMMAND INPUT & HISTORY
            // ═══════════════════════════════════════
            var cmdHistory = JSON.parse(localStorage.getItem("mud_cmd_history") || "[]");
            var historyIndex = cmdHistory.length;
            var currentDraft = "";
 
            $input.on("keydown", function(e) {
                // ENTER
                if (e.key === "Enter" && !e.shiftKey) {
                    var val = $input.val().trim();
                    if (val) {
                        Evennia.msg("text", [val], {});
                        $output.append("<div class='msg echo'>&#x276F; " + $('<span>').text(val).html() + "</div>");
                        scrollToBottom();
 
                        if (cmdHistory.length === 0 || cmdHistory[cmdHistory.length - 1] !== val) {
                            cmdHistory.push(val);
                            if (cmdHistory.length > 100) cmdHistory.shift();
                            localStorage.setItem("mud_cmd_history", JSON.stringify(cmdHistory));
                        }
                    }
                    $input.val("");
                    $charCount.text('');
                    historyIndex = cmdHistory.length;
                    currentDraft = "";
                }
 
                // UP ARROW
                else if (e.key === "ArrowUp") {
                    if (cmdHistory.length > 0) {
                        e.preventDefault();
                        if (historyIndex === cmdHistory.length) { currentDraft = $input.val(); }
                        if (historyIndex > 0) { historyIndex--; $input.val(cmdHistory[historyIndex]); }
                    }
                }
 
                // DOWN ARROW
                else if (e.key === "ArrowDown") {
                    if (cmdHistory.length > 0) {
                        e.preventDefault();
                        if (historyIndex < cmdHistory.length - 1) {
                            historyIndex++;
                            $input.val(cmdHistory[historyIndex]);
                        } else if (historyIndex === cmdHistory.length - 1) {
                            historyIndex++;
                            $input.val(currentDraft);
                        }
                    }
                }
 
                // ESCAPE
                else if (e.key === "Escape") {
                    $input.val("");
                    $charCount.text('');
                    currentDraft = "";
                    historyIndex = cmdHistory.length;
                }
 
                // CTRL+L
                else if (e.key === "l" && e.ctrlKey) {
                    e.preventDefault();
                    $output.empty();
                }
            });
 
            // Auto-focus
            $(document).on("click", function() {
                if (window.getSelection().toString() === "") { $input.focus(); }
            });
 
            // Volume slider
            $('#volume-slider').on('input', function() {
                musicVolume = this.value / 100;
                if (currentTrack) currentTrack.volume = musicVolume;
            });
 
        });
    </script>
</body>
</html>
