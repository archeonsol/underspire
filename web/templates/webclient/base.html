{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{game_name}}</title>

    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Fira+Code:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500;700&family=Source+Code+Pro:wght@300;400;500;700&family=Inconsolata:wght@300;400;500;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
      :root {
        --bg-deep: #020204;
        --bg-surface: #08080c;
        --bg-raised: #0e0e14;
        --text-primary: #c8c8d0;
        --text-dim: #606070;
        --text-ghost: #2a2a35;
        --accent-blood: #8b1a1a;
        --accent-ember: #c43030;
        --accent-glow: rgba(200, 200, 208, 0.15);
        --border-subtle: rgba(139, 26, 26, 0.2);
        --vignette-intensity: 0.7;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-deep);
        color: var(--text-primary);
        font-family: "IBM Plex Mono", monospace;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-size: 14.5px;
        line-height: 1.1;
      }

      /* CRT Effects */
      .crt-frame {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 900;
        background: radial-gradient(
          ellipse 85% 80% at 50% 50%,
          transparent 55%,
          rgba(0, 0, 0, var(--vignette-intensity)) 100%
        );
      }
      .scanlines {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 901;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.08) 2px,
          rgba(0, 0, 0, 0.08) 4px
        );
        mix-blend-mode: multiply;
      }
      .flicker {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 902;
        opacity: 0;
        background: rgba(200, 200, 208, 0.015);
        animation: screenFlicker 8s infinite;
      }
      @keyframes screenFlicker {
        0%,
        96%,
        100% {
          opacity: 0;
        }
        96.5% {
          opacity: 1;
        }
        97% {
          opacity: 0;
        }
        97.5% {
          opacity: 0.5;
        }
        98% {
          opacity: 0;
        }
      }

      /* HUD */
      #hud {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 24px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border-subtle);
        font-size: 11.5px;
        letter-spacing: 0.08em;
        color: var(--text-dim);
        text-transform: uppercase;
        flex-shrink: 0;
        z-index: 10;
        user-select: none;
      }
      #hud .hud-left,
      #hud .hud-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .connection-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent-blood);
        display: inline-block;
        margin-right: 6px;
        transition:
          background 0.5s,
          box-shadow 0.5s;
      }
      .connection-dot.connected {
        background: #2d8a4e;
        box-shadow: 0 0 6px rgba(45, 138, 78, 0.6);
      }
      .game-title {
        color: var(--accent-ember);
        font-weight: 500;
        font-size: 12px;
        letter-spacing: 0.15em;
      }
      .clock {
        font-variant-numeric: tabular-nums;
      }

      /* Output */
      #output-wrapper {
        flex-grow: 1;
        position: relative;
        overflow: hidden;
      }
      #output {
        height: 100%;
        padding: 24px 28px 40px;
        overflow-y: auto;
        word-wrap: break-word;
        white-space: pre-wrap;

        line-height: 1.1;
      }
      #output .msg {
        padding: 0;
        margin: 0;
        line-height: inherit;
        display: block;
      }
      #output .echo {
        color: var(--text-dim);
        border-left: 2px solid var(--border-subtle);
        padding-left: 12px;
        margin: 4px 0;
      }
      #output .sys {
        color: var(--accent-blood);
        font-size: 12px;
        letter-spacing: 0.06em;
        opacity: 0.7;
      }
      #output a {
        color: var(--accent-ember);
        text-decoration: none;
        border-bottom: 1px solid var(--border-subtle);
      }
      #output a:hover {
        color: #ff4444;
        border-color: #ff4444;
      }

      /* Scrollbar */
      #output::-webkit-scrollbar {
        width: 6px;
      }
      #output::-webkit-scrollbar-track {
        background: transparent;
      }
      #output::-webkit-scrollbar-thumb {
        background: rgba(139, 26, 26, 0.3);
        border-radius: 3px;
      }
      #output::-webkit-scrollbar-thumb:hover {
        background: rgba(139, 26, 26, 0.5);
      }

      /* Scroll-to-bottom */
      #scroll-anchor {
        position: absolute;
        bottom: 16px;
        right: 24px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--bg-raised);
        border: 1px solid var(--border-subtle);
        color: var(--accent-ember);
        font-size: 16px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        transition:
          opacity 0.2s,
          transform 0.2s;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      }
      #scroll-anchor:hover {
        transform: scale(1.1);
        background: var(--accent-blood);
        color: #fff;
      }
      #scroll-anchor.visible {
        display: flex;
      }

      /* Input */
      #input-container {
        display: flex;
        padding: 14px 24px;
        background: var(--bg-surface);
        border-top: 1px solid var(--border-subtle);
        align-items: center;
        flex-shrink: 0;
        z-index: 10;
        position: relative;
      }
      #input-container::before {
        content: "";
        position: absolute;
        top: -1px;
        left: 10%;
        right: 10%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent-blood),
          var(--accent-ember),
          var(--accent-blood),
          transparent
        );
        opacity: 0.4;
      }
      #prompt {
        color: var(--accent-ember);
        margin-right: 14px;
        font-weight: 500;
        font-size: 18px;
        user-select: none;
        text-shadow: 0 0 8px rgba(196, 48, 48, 0.4);
      }
      #inputfield {
        flex-grow: 1;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-family: "Fira Code", "IBM Plex Mono", monospace;
        font-size: 15px;
        outline: none;
        caret-color: var(--accent-ember);
      }
      #inputfield::placeholder {
        color: var(--text-ghost);
        font-style: italic;
      }
      #char-count {
        font-size: 10px;
        color: var(--text-ghost);
        margin-left: 12px;
        font-variant-numeric: tabular-nums;
        min-width: 40px;
        text-align: right;
      }
      #char-count.warn {
        color: var(--accent-ember);
      }

      /* Boot Overlay */
      #boot-screen {
        position: fixed;
        inset: 0;
        background: var(--bg-deep);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: "IBM Plex Mono", monospace;
        transition: opacity 0.8s ease;
      }
      #boot-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .boot-text {
        color: var(--text-dim);
        font-size: 12px;
        letter-spacing: 0.1em;
        max-width: 500px;
        width: 90%;
      }
      .boot-text .line {
        opacity: 0;
        transform: translateY(2px);
        transition:
          opacity 0.3s,
          transform 0.3s;
      }
      .boot-text .line.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .boot-text .line.ok {
        color: #2d8a4e;
      }
      .boot-text .line.warn {
        color: var(--accent-ember);
      }
      .boot-text .line.title {
        color: var(--accent-ember);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.2em;
        margin-bottom: 16px;
        text-shadow: 0 0 20px rgba(196, 48, 48, 0.5);
      }

      /* Volume */
      #volume-control {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      #volume-control svg {
        width: 14px;
        height: 14px;
        fill: var(--text-dim);
        transition: fill 0.2s;
      }
      #volume-control:hover svg {
        fill: var(--text-primary);
      }
      #volume-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 60px;
        height: 3px;
        background: var(--text-ghost);
        border-radius: 2px;
        outline: none;
      }
      #volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-ember);
        cursor: pointer;
      }

           Evennia's text2html.js converts MUD

           ═══════════════════════════════════════ */

      /* Standard ANSI foreground */
      .ansi-black {

        color: #dddddd;
      }

      /* Bright / bold ANSI foreground */

        color: #888888;
      }
      .ansi-bright-red {

      .ansi-bright-white {

      }

      /* ANSI background */
      .ansi-bg-black {
        background-color: #000000;
      }
      .ansi-bg-red {
        background-color: #aa0000;
      }
      .ansi-bg-green {
        background-color: #00aa00;
      }
      .ansi-bg-yellow {
        background-color: #aa5500;
      }
      .ansi-bg-blue {
        background-color: #0000aa;
      }
      .ansi-bg-magenta {
        background-color: #aa00aa;
      }
      .ansi-bg-cyan {
        background-color: #00aaaa;
      }
      .ansi-bg-white {
        background-color: #aaaaaa;
      }

      /* Text decoration classes */
      .ansi-bold {
        font-weight: 700;
      }
      .ansi-dim {
        opacity: 0.6;
      }
      .ansi-italic {
        font-style: italic;
      }
      .ansi-underline {
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .ansi-blink {
        animation: ansiBlink 1s step-end infinite;
      }
      .ansi-inverse {
        filter: invert(1);
      }
      .ansi-strike,
      .ansi-strikethrough {
        text-decoration: line-through;
      }

      @keyframes ansiBlink {
        50% {
          opacity: 0;
        }
      }

      /* Settings gear button */
      #settings-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #settings-btn svg {
        width: 15px;
        height: 15px;
        fill: var(--text-dim);
        transition:
          fill 0.2s,
          transform 0.3s;
      }
      #settings-btn:hover svg {
        fill: var(--text-primary);
        transform: rotate(45deg);
      }

      /* Settings panel */
      #settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 3000;
        display: none;
        align-items: center;
        justify-content: center;
      }
      #settings-overlay.open {
        display: flex;
      }

      #settings-panel {
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        padding: 28px 32px;
        width: 380px;
        max-width: 90vw;
        max-height: 85vh;
        overflow-y: auto;
        overflow-x: visible;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.7),
          0 0 40px rgba(139, 26, 26, 0.1);
        animation: panelIn 0.2s ease-out;
        position: relative;
        z-index: 3001;
      }
      @keyframes panelIn {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(8px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      #settings-panel h2 {
        font-family: "IBM Plex Mono", monospace;
        color: var(--accent-ember);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-subtle);
      }

      .settings-section {
        margin-bottom: 20px;
      }
      .settings-section:last-child {
        margin-bottom: 0;
      }

      .settings-label {
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
        display: block;
      }

      /* Custom select */
      .settings-select {
        width: 100%;
        padding: 8px 12px;
        background: var(--bg-deep);
        color: var(--text-primary);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        font-family: inherit;
        font-size: 13px;
        outline: none;
        cursor: pointer;
        position: relative;
        z-index: 3001;
      }
      .settings-select:hover {
        border-color: var(--accent-blood);
      }
      .settings-select:focus {
        border-color: var(--accent-ember);
      }
      .settings-select option {
        background: var(--bg-deep);
        color: var(--text-primary);
      }

      /* Slider row */
      .settings-slider-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .settings-slider {
        flex-grow: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 3px;
        background: var(--text-ghost);
        border-radius: 2px;
        outline: none;
      }
      .settings-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent-ember);
        cursor: pointer;
      }
      .settings-slider-val {
        font-size: 12px;
        color: var(--text-dim);
        min-width: 32px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      /* Toggle switch */
      .settings-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0;
      }
      .settings-toggle + .settings-toggle {
        border-top: 1px solid var(--border-dim, rgba(255, 255, 255, 0.04));
      }

      .toggle-label {
        font-size: 13px;
        color: var(--text-primary);
      }

      .toggle-switch {
        position: relative;
        width: 36px;
        height: 20px;
        cursor: pointer;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-track {
        position: absolute;
        inset: 0;
        background: var(--text-ghost);
        border-radius: 10px;
        transition: background 0.2s;
      }
      .toggle-knob {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        background: var(--text-dim);
        border-radius: 50%;
        transition:
          transform 0.2s,
          background 0.2s;
      }
      .toggle-switch input:checked ~ .toggle-track {
        background: var(--accent-blood);
      }
      .toggle-switch input:checked ~ .toggle-knob {
        transform: translateX(16px);
        background: var(--accent-ember);
      }

      /* Close button */
      #settings-close {
        display: block;
        width: 100%;
        margin-top: 20px;
        padding: 8px;
        background: var(--bg-deep);
        color: var(--text-dim);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
      #settings-close:hover {
        color: var(--text-primary);
        border-color: var(--accent-blood);
      }

      /* Font preview */
      .font-preview {
        margin-top: 6px;
        padding: 8px 10px;
        background: var(--bg-deep);
        border-radius: 3px;
        font-size: 13px;
        color: var(--text-dim);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      /* Ember particle canvas */
      #ember-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 1;
        opacity: 0.6;
      }

      @media (max-width: 600px) {
        #output {
          padding: 16px;
          font-size: 13px;
        }
        #input-container {
          padding: 12px 16px;
        }
        #hud {
          padding: 6px 16px;
          font-size: 10px;
        }
      }
    </style>

    <script language="javascript" type="text/javascript">
      {% if websocket_enabled %}
          var wsactive = true;
      {% else %}
          var wsactive = false;
      {% endif %}

      {% if browser_sessid %}
         var csessid = "{{browser_sessid}}";
      {% else %}
         var csessid = false;
      {% endif %}

      {% if websocket_url %}
          var wsurl = "{{websocket_url}}";
      {% else %}
          var wsurl = "ws://" + this.location.hostname + ":{{websocket_port}}";
      {% endif %}

      // Dummy plugin handler so text2html.js doesn't crash looking for GoldenLayout
      window.plugin_handler = {
          add: function(name, plugin) { console.log("[sys] plugin bypass: " + name); }
      };
    </script>

    <script src="{% static 'webclient/js/evennia.js' %}"></script>
    <script src="{% static 'webclient/js/plugins/text2html.js' %}"></script>

    <script>
      $(document).ready(function () {
        var $output = $("#output");
        var $input = $("#inputfield");
        var $scrollBtn = $("#scroll-anchor");
        var $charCount = $("#char-count");
        var currentTrack = null;
        var musicVolume = 0.4;
        var autoScroll = true;

        // ═══════════════════════════════════════
        //  1. INITIALIZE EVENNIA IMMEDIATELY
        //     Connection opens right away.
        //     We do NOT pass onText here because
        //     this Evennia version uses the emitter
        //     system for receiving messages.
        // ═══════════════════════════════════════
        console.log("[sys] Booting Web Client...");
        Evennia.init({
          autoConnect: true,
        });

        // ═══════════════════════════════════════
        //  2. ATTACH ALL HANDLERS VIA EMITTER
        //     Poll until emitter is ready, then
        //     hook text, prompt, connection, and
        //     audio events through it.
        // ═══════════════════════════════════════
        var emitterReady = setInterval(function () {
          if (Evennia.emitter) {
            clearInterval(emitterReady);
            console.log("[sys] Emitter ready. Attaching handlers.");

            // --- RECEIVE TEXT FROM SERVER ---
            Evennia.emitter.on("text", function (args, kwargs) {
              var text = args[0];
              if (window.text2html) {
                text = window.text2html(text);
              }
              typewriter($("<div class='msg'>").html(text));
            });

            // --- RECEIVE PROMPTS ---
            Evennia.emitter.on("prompt", function (args, kwargs) {
              var text = args[0];
              if (window.text2html) {
                text = window.text2html(text);
              }
              typewriter(
                $("<div class='msg'>")
                  .css("color", "var(--accent-ember)")
                  .html(text),
              );
            });

            // --- CONNECTION STATUS ---
            Evennia.emitter.on("connection_open", function () {
              console.log("[sys] WebSocket connected.");
              $("#conn-dot").addClass("connected");
              $("#conn-status").text("LINKED");
            });

            Evennia.emitter.on("connection_close", function () {
              console.log("[sys] WebSocket disconnected.");
              $("#conn-dot").removeClass("connected");
              $("#conn-status").text("SEVERED");
            });

            // --- AUDIO ---
            Evennia.emitter.on("play_music", function (args) {
              if (currentTrack) {
                currentTrack.pause();
                currentTrack.currentTime = 0;
              }
              currentTrack = new Audio(args[0]);
              currentTrack.volume = musicVolume;
              currentTrack.loop = true;
              currentTrack.play().catch(function () {
                var forcePlay = function () {
                  if (currentTrack) currentTrack.play();
                  $(document).off("click keydown", forcePlay);
                };
                $(document).on("click keydown", forcePlay);
              });
              return true;
            });

            Evennia.emitter.on("stop_music", function () {
              if (currentTrack) {
                var fade = setInterval(function () {
                  if (currentTrack.volume > 0.05) {
                    currentTrack.volume = Math.max(
                      0,
                      currentTrack.volume - 0.05,
                    );
                  } else {
                    currentTrack.pause();
                    currentTrack.currentTime = 0;
                    clearInterval(fade);
                  }
                }, 150);
              }
              return true;
            });
          }
        }, 50);

        // ═══════════════════════════════════════
        //  3. BOOT SEQUENCE (cosmetic only)
        // ═══════════════════════════════════════
        var bootLines = [
          { text: "{{game_name}}", cls: "title", delay: 200 },
          { text: "────────────────────────────────", cls: "", delay: 100 },
          { text: "BIOS .......... HAEMATIC TERM v2.0", cls: "", delay: 150 },
          { text: "MEM CHECK ..... 640K OK", cls: "ok", delay: 120 },
          {
            text: "WEBSOCKET ..... " + (wsactive ? "ENABLED" : "POLLING"),
            cls: wsactive ? "ok" : "warn",
            delay: 200,
          },
          { text: "AUDIO SYS ..... STANDBY", cls: "", delay: 100 },
          { text: "CIPHER KEY .... ACCEPTED", cls: "ok", delay: 180 },
          { text: "────────────────────────────────", cls: "", delay: 100 },
          { text: "ESTABLISHING UPLINK...", cls: "warn", delay: 400 },
        ];

        var $bootLog = $("#boot-log");
        function runBoot(index) {
          if (index >= bootLines.length) {
            setTimeout(function () {
              $("#boot-screen").addClass("fade-out");
              setTimeout(function () {
                $("#boot-screen").remove();
              }, 900);
            }, 600);
            return;
          }
          var line = bootLines[index];
          var $line = $(
            '<div class="line ' + line.cls + '">' + line.text + "</div>",
          );
          $bootLog.append($line);
          setTimeout(function () {
            $line.addClass("visible");
          }, 20);
          setTimeout(function () {
            runBoot(index + 1);
          }, line.delay);
        }
        runBoot(0);

        // ═══════════════════════════════════════
        //  4. SCROLL MANAGEMENT
        // ═══════════════════════════════════════
        var programmaticScroll = false;
        $output.on("scroll", function () {
          if (programmaticScroll) return;
          var el = $output[0];
          var nearBottom =
            el.scrollHeight - el.scrollTop - el.clientHeight < 80;
          autoScroll = nearBottom;
          $scrollBtn.toggleClass("visible", !nearBottom);
        });
        $scrollBtn.on("click", function () {
          autoScroll = true;
          $scrollBtn.toggleClass("visible", false);
          programmaticScroll = true;
          $output[0].scrollTo({
            top: $output[0].scrollHeight,
            behavior: "instant",
          });
          programmaticScroll = false;
        });
        function scrollToBottom() {
          if (autoScroll) {
            programmaticScroll = true;
            $output[0].scrollTo({
              top: $output[0].scrollHeight,
              behavior: "instant",
            });
            programmaticScroll = false;
          }
        }
        function typewriter($el) {
          $output.append($el);
          if (!settings || !settings.msgAnim) {
            scrollToBottom();
            return;
          }
          var segments = [];
          var walker = document.createTreeWalker(
            $el[0],
            NodeFilter.SHOW_TEXT,
            null,
            false,
          );
          var node;
          while ((node = walker.nextNode())) {
            if (node.textContent.length > 0) {
              segments.push({ node: node, full: node.textContent });
              node.textContent = "";
            }
          }
          var totalChars = 0;
          for (var i = 0; i < segments.length; i++) {
            totalChars += segments[i].full.length;
          }
          if (totalChars === 0) {
            scrollToBottom();
            return;
          }
          // Target 200ms at ~60fps = ~12 frames
          var charsPerFrame = Math.max(1, Math.ceil(totalChars / 16));
          var segIdx = 0;
          var charIdx = 0;
          function tick() {
            for (var i = 0; i < charsPerFrame; i++) {
              if (segIdx >= segments.length) break;
              var seg = segments[segIdx];
              charIdx++;
              seg.node.textContent = seg.full.slice(0, charIdx);
              if (charIdx >= seg.full.length) {
                segIdx++;
                charIdx = 0;
              }
            }
            scrollToBottom();
            if (segIdx < segments.length) {
              requestAnimationFrame(tick);
            }
          }
          requestAnimationFrame(tick);
        }

        // ═══════════════════════════════════════
        //  5. CLOCK
        // ═══════════════════════════════════════
        function updateClock() {
          var now = new Date();
          $("#clock").text(
            String(now.getHours()).padStart(2, "0") +
              ":" +
              String(now.getMinutes()).padStart(2, "0"),
          );
        }
        updateClock();
        setInterval(updateClock, 15000);

        // ═══════════════════════════════════════
        //  6. CHARACTER COUNT
        // ═══════════════════════════════════════
        $input.on("input", function () {
          var len = $input.val().length;
          if (len > 0) {
            $charCount.text(len).toggleClass("warn", len > 200);
          } else {
            $charCount.text("");
          }
        });

        // ═══════════════════════════════════════
        //  7. COMMAND INPUT & HISTORY
        // ═══════════════════════════════════════
        var cmdHistory = JSON.parse(
          localStorage.getItem("mud_cmd_history") || "[]",
        );
        var historyIndex = cmdHistory.length;
        var currentDraft = "";

        $input.on("keydown", function (e) {
          // ENTER
          if (e.key === "Enter" && !e.shiftKey) {
            var val = $input.val().trim();
            if (val) {
              Evennia.msg("text", [val], {});
              $output.append(
                "<div class='msg echo'>&#x276F; " +
                  $("<span>").text(val).html() +
                  "</div>",
              );
              scrollToBottom();

              if (
                cmdHistory.length === 0 ||
                cmdHistory[cmdHistory.length - 1] !== val
              ) {
                cmdHistory.push(val);
                if (cmdHistory.length > 100) cmdHistory.shift();
                localStorage.setItem(
                  "mud_cmd_history",
                  JSON.stringify(cmdHistory),
                );
              }
            }
            $input.val("");
            $charCount.text("");
            historyIndex = cmdHistory.length;
            currentDraft = "";
          }

          // UP ARROW
          else if (e.key === "ArrowUp") {
            if (cmdHistory.length > 0) {
              e.preventDefault();
              if (historyIndex === cmdHistory.length) {
                currentDraft = $input.val();
              }
              if (historyIndex > 0) {
                historyIndex--;
                $input.val(cmdHistory[historyIndex]);
              }
            }
          }

          // DOWN ARROW
          else if (e.key === "ArrowDown") {
            if (cmdHistory.length > 0) {
              e.preventDefault();
              if (historyIndex < cmdHistory.length - 1) {
                historyIndex++;
                $input.val(cmdHistory[historyIndex]);
              } else if (historyIndex === cmdHistory.length - 1) {
                historyIndex++;
                $input.val(currentDraft);
              }
            }
          }

          // ESCAPE
          else if (e.key === "Escape") {
            $input.val("");
            $charCount.text("");
            currentDraft = "";
            historyIndex = cmdHistory.length;
          }

          // CTRL+L
          else if (e.key === "l" && e.ctrlKey) {
            e.preventDefault();
            $output.empty();
          }
        });

        // Auto-focus (skip when settings panel is open)
        $(document).on("click", function (e) {
          if ($("#settings-overlay").hasClass("open")) return;
          if ($(e.target).closest("#hud, #settings-overlay").length) return;
          if (window.getSelection().toString() === "") {
            $input.focus();
          }
        });

        // Volume slider
        $("#volume-slider").on("input", function () {
          musicVolume = this.value / 100;
          if (currentTrack) currentTrack.volume = musicVolume;
        });

        // ═══════════════════════════════════════
        //  8. SETTINGS PANEL
        // ═══════════════════════════════════════
        var SETTINGS_KEY = "mud_terminal_settings";
        var SETTINGS_VER = 4; // Bump this to force a reset
        var defaults = {
          _ver: SETTINGS_VER,
          font: "'IBM Plex Mono', monospace",
          fontSize: 14,
          lineHeight: 1.1,
          scanlines: true,
          flicker: true,
          vignette: true,
          embers: true,
          msgAnim: true,
        };

        function loadSettings() {
          try {
            var saved = JSON.parse(localStorage.getItem(SETTINGS_KEY));
            if (!saved || saved._ver !== SETTINGS_VER) {
              // Stale or missing — nuke and use fresh defaults
              localStorage.removeItem(SETTINGS_KEY);
              return $.extend({}, defaults);
            }
            return $.extend({}, defaults, saved);
          } catch (e) {
            return $.extend({}, defaults);
          }
        }

        function saveSettings(s) {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
        }

        function applySettings(s) {
          // Font
          $output.css("font-family", s.font);
          $("#font-preview").css("font-family", s.font);

          // Font size & line height
          $output.css({
            "font-size": s.fontSize + "px",
            "line-height": s.lineHeight,
          });
          $("#fontsize-val").text(s.fontSize + "px");
          $("#lineheight-val").text(s.lineHeight.toFixed(1));

          // Sync controls
          $("#set-font").val(s.font);
          $("#set-fontsize").val(s.fontSize);
          $("#set-lineheight").val(s.lineHeight);
          $("#set-scanlines").prop("checked", s.scanlines);
          $("#set-flicker").prop("checked", s.flicker);
          $("#set-vignette").prop("checked", s.vignette);
          $("#set-embers").prop("checked", s.embers);
          $("#set-msganim").prop("checked", s.msgAnim);

          // Effects visibility
          $(".scanlines").toggle(s.scanlines);
          $(".flicker").toggle(s.flicker);
          $(".crt-frame").toggle(s.vignette);
          $("#ember-canvas").toggle(s.embers);
          window.embersEnabled = s.embers;
        }

        var settings = loadSettings();
        applySettings(settings);

        // Open / Close
        $("#settings-btn").on("click", function (e) {
          e.stopPropagation();
          $("#settings-overlay").addClass("open");
        });
        $("#settings-close").on("click", function () {
          $("#settings-overlay").removeClass("open");
          $input.focus();
        });
        $("#settings-overlay").on("click", function (e) {
          if (e.target === this) {
            $(this).removeClass("open");
            $input.focus();
          }
        });
        // ESC closes settings too
        $(document).on("keydown", function (e) {
          if (e.key === "Escape" && $("#settings-overlay").hasClass("open")) {
            e.stopImmediatePropagation();
            $("#settings-overlay").removeClass("open");
            $input.focus();
          }
        });

        // Font select
        $("#set-font").on("change", function () {
          settings.font = $(this).val();
          applySettings(settings);
          saveSettings(settings);
        });

        // Font size
        $("#set-fontsize").on("input", function () {
          settings.fontSize = parseInt(this.value);
          applySettings(settings);
          saveSettings(settings);
        });

        // Line height
        $("#set-lineheight").on("input", function () {
          settings.lineHeight = parseFloat(this.value);
          applySettings(settings);
          saveSettings(settings);
        });

        // Toggles
        $(
          "#set-scanlines, #set-flicker, #set-vignette, #set-embers, #set-msganim",
        ).on("change", function () {
          settings.scanlines = $("#set-scanlines").is(":checked");
          settings.flicker = $("#set-flicker").is(":checked");
          settings.vignette = $("#set-vignette").is(":checked");
          settings.embers = $("#set-embers").is(":checked");
          settings.msgAnim = $("#set-msganim").is(":checked");

          applySettings(settings);
          saveSettings(settings);
        });
      });
    </script>

    <!-- ═══════════════════════════════════════
         EMBER PARTICLE SYSTEM
         Drifting embers / motes that rise slowly
         through the terminal background.
         ═══════════════════════════════════════ -->
    <script>
      (function () {
        if (typeof window.embersEnabled === "undefined")
          window.embersEnabled = true;
        var canvas = document.getElementById("ember-canvas");
        var ctx = canvas.getContext("2d");
        var particles = [];
        var MAX_PARTICLES = 40;
        var animId;

        // Color palette: blood reds, deep ambers, faint ash
        var palette = [
          { r: 139, g: 26, b: 26 }, // blood
          { r: 180, g: 40, b: 20 }, // deep ember
          { r: 200, g: 60, b: 30 }, // hot ember
          { r: 160, g: 50, b: 25 }, // smolder
          { r: 100, g: 20, b: 15 }, // dark coal
          { r: 80, g: 70, b: 65 }, // ash
          { r: 60, g: 55, b: 50 }, // cold ash
        ];

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        function spawn() {
          var col = palette[Math.floor(Math.random() * palette.length)];
          // Bias: most particles are tiny specks, a few are larger embers
          var isEmber = Math.random() < 0.15;
          return {
            x: Math.random() * canvas.width,
            y: canvas.height + 10 + Math.random() * 40,
            radius: isEmber
              ? 1.2 + Math.random() * 1.8
              : 0.4 + Math.random() * 1.0,
            vx: (Math.random() - 0.5) * 0.3, // gentle horizontal drift
            vy: -(0.15 + Math.random() * 0.45), // slow rise
            drift: (Math.random() - 0.5) * 0.008, // sinusoidal wobble rate
            phase: Math.random() * Math.PI * 2,
            wobble: 8 + Math.random() * 20, // wobble amplitude
            life: 0,
            maxLife: 400 + Math.random() * 600, // frames alive
            r: col.r,
            g: col.g,
            b: col.b,
            bright: isEmber
              ? 0.6 + Math.random() * 0.4
              : 0.2 + Math.random() * 0.4,
            pulse: isEmber ? 0.02 + Math.random() * 0.03 : 0, // embers glow-pulse
          };
        }

        // Seed initial particles spread across the screen
        for (var i = 0; i < MAX_PARTICLES; i++) {
          var p = spawn();
          p.y = Math.random() * canvas.height;
          p.life = Math.random() * p.maxLife * 0.6;
          particles.push(p);
        }

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Respect settings toggle
          if (window.embersEnabled === false) {
            animId = requestAnimationFrame(draw);
            return;
          }

          for (var i = particles.length - 1; i >= 0; i--) {
            var p = particles[i];
            p.life++;

            // Fade in during first 60 frames, fade out in last 80
            var fadeIn = Math.min(1, p.life / 60);
            var fadeOut = Math.min(1, (p.maxLife - p.life) / 80);
            var alpha = p.bright * fadeIn * fadeOut;

            // Glow pulse for embers
            if (p.pulse > 0) {
              alpha += Math.sin(p.life * p.pulse) * 0.15;
            }
            alpha = Math.max(0, Math.min(1, alpha));

            // Movement
            p.phase += p.drift;
            p.x += p.vx + Math.sin(p.phase) * (p.wobble * 0.01);
            p.y += p.vy;

            // Draw
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle =
              "rgba(" +
              p.r +
              "," +
              p.g +
              "," +
              p.b +
              "," +
              alpha.toFixed(3) +
              ")";
            ctx.fill();

            // Soft glow for larger embers
            if (p.radius > 1.5 && alpha > 0.3) {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
              ctx.fillStyle =
                "rgba(" +
                p.r +
                "," +
                p.g +
                "," +
                p.b +
                "," +
                (alpha * 0.12).toFixed(3) +
                ")";
              ctx.fill();
            }

            // Recycle dead or off-screen particles
            if (
              p.life >= p.maxLife ||
              p.y < -20 ||
              p.x < -30 ||
              p.x > canvas.width + 30
            ) {
              particles[i] = spawn();
            }
          }

          animId = requestAnimationFrame(draw);
        }

        draw();

        // Pause when tab is hidden to save CPU
        document.addEventListener("visibilitychange", function () {
          if (document.hidden) {
            cancelAnimationFrame(animId);
          } else {
            animId = requestAnimationFrame(draw);
          }
        });
      })();
    </script>
  </body>
